# Fleetge
# Multi-host Docker fleet management console.
#
# Prerequisites:
#   1. Generate JWT_SECRET: python -c "import secrets; print(secrets.token_hex(32))"
#   2. Generate CREDENTIALS_KEY: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#   3. Hash admin password: pip install pwdlib[argon2]; python -c "from pwdlib import PasswordHash; print(PasswordHash.recommended().hash('your-password'))"
#   4. Create hosts.yaml in ./data/ directory
#   5. Set the three env vars below in .env
#
# Usage:
#   cp .env.example .env   # edit .env with your secrets
#   cp hosts.yaml.example data/hosts.yaml   # edit with your host configs
#   docker compose up -d

services:
  fleetge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fleetge
    restart: unless-stopped
    env_file: .env
    environment:
      # Runtime state lives in the mounted data directory; images stay stateless.
      DATABASE_URL: sqlite:////app/data/dashboard-local.db
      HOST_CONFIG_PATH: /app/data/hosts.yaml
    volumes:
      - ./data:/app/data
    ports:
      # The user-facing port — put this behind Lucky / nginx with HTTPS if needed.
      - "80:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
