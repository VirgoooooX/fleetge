name: Build Fleetge images

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "VERSION"
      - ".github/workflows/fleetge-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push ${{ matrix.service }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: backend
            image_suffix: host-dashboard-backend-public
          - service: frontend
            context: frontend
            image_suffix: host-dashboard-frontend-public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/${{ matrix.image_suffix }}"
          echo "name=${image,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
